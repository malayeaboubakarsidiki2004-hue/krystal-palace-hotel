# ══════════════════════════════════════════════════════════════════════════════
# render.yaml — Déploiement du serveur PMS (Krystal Palace v7) sur Render.com
#
# NE DÉPLOIE QUE LE SERVEUR PMS (port 8000 / interface client + admin + API).
# La passerelle BACnet (gateway) doit rester sur le même réseau local que le
# simulateur YABE (ou l'automate physique) : elle n'a pas sa place ici, voir
# le guide de reconstruction, section "Déploiement".
# ══════════════════════════════════════════════════════════════════════════════

databases:
  - name: krystal-palace-db
    plan: free
    databaseName: krystal_palace
    user: krystal_user

services:
  - type: web
    name: krystal-palace-pms
    runtime: python
    plan: free
    buildCommand: "pip install -r krystal_palace/requirements.txt"
    startCommand: "uvicorn krystal_palace.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: krystal-palace-db
          property: connectionString
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: GATEWAY_URL
        sync: false        # ex: https://votre-tunnel-vers-la-gateway-locale
      - key: GATEWAY_TOKEN
        sync: false
      - key: OM_NUMERO_RECEPTEUR
        sync: false
